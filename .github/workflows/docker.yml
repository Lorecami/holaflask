name: Docker Publish

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          docker build -t ghcr.io/lorecami/holaflask:1.0.0 .

      - name: Push
        run: |
          docker push ghcr.io/lorecami/holaflask:1.0.0